<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{CHAPTER}}. {{TITLE_KZ}}</title>
{{FONTS}}
<style>
{{BASE_CSS}}
</style>
<style>
{{THEME_CSS}}
</style>
</head>
<body>

<header class="topbar">
  <span class="chapter">{{CHAPTER}}</span>
  <span class="topic"><span data-kz="{{TITLE_KZ}}" data-ru="{{TITLE_RU}}"></span></span>
  <span class="sep"></span>
  <button class="icon-btn" data-action="menu" title="M"><span data-kz="☰ Мазмұны" data-ru="☰ Содержание"></span></button>
  <button class="icon-btn" data-action="fullscreen" title="F">⛶</button>
  <div class="zoom-group">
    <button class="icon-btn" data-action="zoom-out">A−</button>
    <button class="icon-btn" data-action="zoom-in">A+</button>
  </div>
  <div class="lang-toggle" role="group" aria-label="Тіл / Язык">
    <button class="lang-btn" data-lang="kz">KZ</button>
    <button class="lang-btn" data-lang="ru">RU</button>
  </div>
</header>

<main class="deck" id="deck">
  <canvas class="pen-canvas" id="pen-canvas"></canvas>
</main>

<footer class="footbar">
  <button class="icon-btn" data-action="prev" aria-label="←">←</button>
  <div class="progress"><i id="pbar"></i></div>
  <button class="counter" id="counter" data-action="menu">1 / 1</button>
  <button class="icon-btn" data-action="next" aria-label="→">→</button>
  <button class="icon-btn pen-btn" data-action="pen" title="P">✏</button>
</footer>

<div class="pen-tools" id="pen-tools" hidden>
  <button class="pen-tool" data-pen="red" aria-label="Қызыл қалам"></button>
  <button class="pen-tool" data-pen="blue" aria-label="Көк қалам"></button>
  <button class="pen-tool" data-pen="eraser" aria-label="Өшіргіш">◫</button>
  <button class="pen-tool" data-pen="undo" aria-label="Болдырмау">↶</button>
  <button class="pen-tool" data-pen="clear" aria-label="Тазалау">✕</button>
</div>

<div class="menu" id="menu" hidden>
  <div class="menu-inner">
    <h2 data-kz="Сабақтың мазмұны" data-ru="Содержание урока"></h2>
    <div class="menu-grid" id="menu-grid"></div>
    <div class="menu-settings">
      <button class="icon-btn" data-action="reset"><span data-kz="↺ Слайдты қайта бастау" data-ru="↺ Сбросить слайд"></span></button>
      <span class="menu-keys" data-kz="→ ← бет · M мазмұны · F экран · R қайта · P қалам" data-ru="→ ← слайд · M меню · F экран · R сброс · P перо"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast" hidden>
  <span id="toast-text"></span>
  <button class="toast-btn" id="toast-action"></button>
</div>

<script>
{{CORE_JS}}
</script>
<script>
{{RAY_JS}}
</script>
<script>
{{PEN_JS}}
</script>
{{PIECES}}
<script>
Deck.boot({ id: "{{DECK_ID}}" });
</script>
</body>
</html>
